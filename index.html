// ── PWA + ピンチ禁止 メタタグ注入 ───────────────────────────
function usePWAMeta() {
  useEffect(() => {
    const vp = document.querySelector('meta[name="viewport"]');
    if (vp) vp.setAttribute("content", "width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover");
    else {
      const m = document.createElement("meta");
      m.name = "viewport";
      m.content = "width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover";
      document.head.prepend(m);
    }
    const metas: [string, string][] = [
      ["apple-mobile-web-app-capable",          "yes"],
      ["apple-mobile-web-app-status-bar-style", "black-translucent"],
      ["apple-mobile-web-app-title",            "sigma"],
      ["mobile-web-app-capable",                "yes"],
      ["theme-color",                           "#080810"],
    ];
    const injected: HTMLMetaElement[] = [];
    metas.forEach(([name, content]) => {
      if (!document.querySelector(`meta[name="${name}"]`)) {
        const m = document.createElement("meta");
        m.name = name; m.content = content;
        document.head.appendChild(m);
        injected.push(m);
      }
    });
    document.title = "sigma";
    const style = document.createElement("style");
    style.id = "pwa-safe";
    style.textContent = `
      *{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
      html,body,#root{height:100%;margin:0;padding:0;background:#080810;overscroll-behavior:none}
      body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
      input,button{font-family:inherit;-webkit-appearance:none;appearance:none}
      body.lock-scroll{overflow:hidden;touch-action:none}
    `;
    if (!document.getElementById("pwa-safe")) document.head.appendChild(style);
    return () => { injected.forEach(m => m.remove()); style.remove(); };
  }, []);
}

  del: (k: string)           => { try { localStorage.removeItem(k); } catch {} },

const getPrev = (hist: any[], name: string) => {
  for (const s of hist) {
    const ex = s.exercises?.find((e: any) => e.name === name);
    if (ex?.sets?.length) { const b = ex.sets.reduce((a: any, b: any) => b.weight > a.weight ? b : a, ex.sets[0]); return { weight: b.weight, reps: b.reps, date: s.date }; }
  }
  return null;
};
const get1RMHist = (hist: any[], exName: string) => {
  const pts: any[] = [], seen = new Set<string>();
  for (const s of [...hist].reverse()) {
    if (seen.has(s.date)) continue;
    const ex = s.exercises?.find((e: any) => e.name === exName);
    if (ex?.sets?.length) { const b = ex.sets.reduce((a: any, b: any) => e1rm(b.weight, b.reps) > e1rm(a.weight, a.reps) ? b : a, ex.sets[0]); pts.push({ date: s.date, rm: e1rm(b.weight, b.reps), weight: b.weight, reps: b.reps }); seen.add(s.date); }
  }
  return pts;
};

// ── AURA BANNER ──────────────────────────────────────────────

  const isSigma = lv.level === 5;
  return (
    <div style={{ margin: "0 14px 12px", padding: "15px 16px", borderRadius: 15, background: isSigma ? "linear-gradient(135deg,rgba(184,58,232,0.14),rgba(232,97,58,0.09))" : "rgba(255,255,255,0.025)", border: `1px solid ${isSigma ? "rgba(184,58,232,0.4)" : "rgba(255,255,255,0.07)"}`, boxShadow: isSigma ? "0 0 32px rgba(184,58,232,0.16)" : "none", transition: "all 0.7s" }}>

        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 7 }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
              <span style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", letterSpacing: "0.12em", fontWeight: 600 }}>AURA RANK</span>
              <span style={{ fontSize: 16, fontWeight: 900, color: lv.color }}>{lv.name}</span>
            </div>
            <div><span style={{ fontSize: 22, fontWeight: 900, fontVariantNumeric: "tabular-nums", color: "#fff", letterSpacing: "-0.05em" }}>{totalPts.toLocaleString()}</span><span style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", marginLeft: 2 }}>AP</span></div>
          </div>
          {next ? (
            <>
              <div style={{ position: "relative", height: 7, background: "rgba(255,255,255,0.05)", borderRadius: 4, overflow: "hidden", border: "1px solid rgba(255,255,255,0.05)" }}>
                <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`, background: `linear-gradient(90deg,${lv.color}99,${lv.color})`, borderRadius: 4, transition: "width 1.1s cubic-bezier(0.34,1.4,0.64,1)", boxShadow: `0 0 10px ${lv.glow}` }} />
                {[25,50,75].map(t => <div key={t} style={{ position: "absolute", left: `${t}%`, top: 0, bottom: 0, width: 1, background: "rgba(0,0,0,0.35)" }} />)}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 5 }}>
                <span style={{ fontSize: 9, color: "rgba(255,255,255,0.22)" }}>{next.emoji} <span style={{ color: next.color, fontWeight: 700 }}>{next.name}</span> まで <span style={{ color: "rgba(255,255,255,0.5)", fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{(next.minPts - totalPts).toLocaleString()} AP</span></span>
                <span style={{ fontSize: 9, color: "rgba(255,255,255,0.2)", fontVariantNumeric: "tabular-nums" }}>{Math.floor(pct)}%</span>

// ── 1RM CHART ────────────────────────────────────────────────
function RMChart({ data, color }: any) {
  if (!data || data.length < 2) return <div style={{ padding: "16px 0", textAlign: "center", color: "rgba(255,255,255,0.2)", fontSize: 12 }}>データが2件以上必要です</div>;
  const W=300,H=100,P={t:10,b:24,l:38,r:12},iW=W-P.l-P.r,iH=H-P.t-P.b;
  const rms=data.map((d:any)=>d.rm),mn=Math.min(...rms),mx=Math.max(...rms),rng=mx-mn||1;
  const xS=(i:number)=>P.l+(i/(data.length-1))*iW,yS=(v:number)=>P.t+iH-((v-mn)/rng)*iH;
  const pts=data.map((d:any,i:number)=>`${xS(i)},${yS(d.rm)}`).join(" ");
  const area=`M${xS(0)},${yS(data[0].rm)} `+data.slice(1).map((d:any,i:number)=>`L${xS(i+1)},${yS(d.rm)}`).join(" ")+` L${xS(data.length-1)},${H-P.b} L${xS(0)},${H-P.b} Z`;
  const mi=rms.indexOf(mx),lbls=new Set([0,data.length-1,mi]);
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: "visible" }}>
      <defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.25" /><stop offset="100%" stopColor={color} stopOpacity="0.02" /></linearGradient></defs>
      {[0,0.5,1].map((f,i)=>{ const y=P.t+iH*(1-f),v=Math.round(mn+rng*f); return <g key={i}><line x1={P.l} y1={y} x2={W-P.r} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth={1} strokeDasharray="3 3"/><text x={P.l-4} y={y+4} textAnchor="end" fill="rgba(255,255,255,0.25)" fontSize={9}>{v}</text></g>; })}
      <path d={area} fill="url(#rg)" /><polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
      {data.map((d:any,i:number)=>{ const x=xS(i),y=yS(d.rm),s=lbls.has(i); return <g key={i}><circle cx={x} cy={y} r={s?4:2.5} fill={color} stroke="#080810" strokeWidth={1.5}/>{s&&<><text x={x} y={y-8} textAnchor="middle" fill={color} fontSize={9} fontWeight="bold">{d.rm}kg</text><text x={x} y={H-P.b+13} textAnchor="middle" fill="rgba(255,255,255,0.28)" fontSize={8}>{fmtDS(d.date)}</text></>}</g>; })}
    </svg>
  );
}

// ── 1RM SCREEN ───────────────────────────────────────────────
function RMScreen({ hist }: any) {
  const names = useMemo(() => { const s = new Set<string>(); hist.forEach((h:any) => h.exercises?.forEach((e:any) => s.add(e.name))); return [...s]; }, [hist]);
  const [sel, setSel] = useState(names[0] ?? "");
  useEffect(() => { if (names.length > 0 && !names.includes(sel)) setSel(names[0]); }, [names]);
  const data = useMemo(() => sel ? get1RMHist(hist, sel) : [], [hist, sel]);
  const cat = useMemo(() => { for (const s of hist) { const ex = s.exercises?.find((e:any) => e.name === sel); if (ex) return catOf(ex.catId); } return CATS[0]; }, [hist, sel]);
  const best=data.length>0?Math.max(...data.map((d:any)=>d.rm)):0,lat=data.length>0?data[data.length-1]:null,prv=data.length>1?data[data.length-2]:null,diff=lat&&prv?lat.rm-prv.rm:0;
  if (!names.length) return <div style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,color:"rgba(255,255,255,0.2)",padding:"60px 20px" }}><ITrend size={40} stroke="rgba(255,255,255,0.1)" /><div style={{ fontSize:14 }}>履歴がまだありません</div></div>;
  return (
    <div style={{ flex:1,overflowY:"auto",paddingBottom:80 }}>

// ── Fix 1 & 4: バックグラウンドタイマー対応 + position:fixed OPAL LOCK ────
function OpalLock({ restTotal, exName, setIdx, onUnlock }: any) {
  // Fix 1: タイマー開始時刻をlocalStorageから復元してrestSecを計算
  const [restSec, setRestSec] = useState(() => {
    const saved = store.get(LS.TIMER, null);
    if (saved?.startedAt && saved?.total) {
      const elapsed = Math.floor((Date.now() - saved.startedAt) / 1000);
      return Math.max(0, saved.total - elapsed);
    }
    return restTotal;
  });
  const [prog, setProg] = useState(0);
  const [hold, setHold] = useState(false);
  const ir = useRef<any>(null);

  // Fix 1: タイマー開始時刻を保存（初回のみ）
  useEffect(() => {
    const saved = store.get(LS.TIMER, null);
    if (!saved?.startedAt) {
      store.set(LS.TIMER, { startedAt: Date.now(), total: restTotal });
    }
  }, []);

  // Fix 1: visibilitychange でフォアグラウンド復帰時に残り時間を再計算
  useEffect(() => {
    const onVis = () => {
      if (document.visibilityState === "visible") {
        const saved = store.get(LS.TIMER, null);
        if (saved?.startedAt && saved?.total) {
          const elapsed = Math.floor((Date.now() - saved.startedAt) / 1000);
          const remaining = Math.max(0, saved.total - elapsed);
          setRestSec(remaining);
          if (remaining === 0) { store.del(LS.TIMER); onUnlock(); }
        }
      }
    };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, [onUnlock]);

  useEffect(() => {
    const tick = setInterval(() => {
      setRestSec((s: number) => {
        if (s <= 1) { clearInterval(tick); store.del(LS.TIMER); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(tick);
  }, []);

  // Fix 4: スクロール禁止
  useEffect(() => {
    document.body.classList.add("lock-scroll");
    return () => document.body.classList.remove("lock-scroll");
  }, []);

  const ps = useCallback((e: any) => {
    e.preventDefault(); setHold(true);
    ir.current = setInterval(() => setProg((p: number) => {
      const n = p + 100 / (HOLD_SEC * 20);
      if (n >= 100) { clearInterval(ir.current); store.del(LS.TIMER); onUnlock(); return 100; }
      return n;
    }), 50);
  }, [onUnlock]);
  const pe = useCallback(() => { setHold(false); clearInterval(ir.current); setProg(0); }, []);
  useEffect(() => () => clearInterval(ir.current), []);

  const R = 54, C = 2 * Math.PI * R, el = restTotal > 0 ? (restTotal - restSec) / restTotal : 0;

  return (
    // Fix 4: position:fixed で背後スクロール完全禁止
    <div style={{ position: "fixed", inset: 0, zIndex: 200, background: "#03030B", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "rgba(255,255,255,0.04)" }}>
        <div style={{ height: "100%", width: `${el * 100}%`, background: "#E8C547", transition: "width 1s linear" }} />
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, color: "rgba(255,255,255,0.2)", fontSize: 10, letterSpacing: "0.12em", marginBottom: 28 }}><ILock size={10} /> FOCUS LOCK · {exName} S{setIdx + 1} 完了</div>
      <div style={{ fontSize: 82, fontWeight: 800, letterSpacing: "-0.06em", lineHeight: 1, fontVariantNumeric: "tabular-nums", color: restSec <= 10 ? "#F5A030" : "#fff", transition: "color 0.5s" }}>{fmtTime(restSec)}</div>
      <div style={{ fontSize: 10, color: "rgba(255,255,255,0.15)", letterSpacing: "0.12em", marginTop: 10 }}>REST INTERVAL</div>
      <div style={{ position: "relative", marginTop: 44 }}>
        <svg width={136} height={136} style={{ transform: "rotate(-90deg)" }}>
          <circle cx={68} cy={68} r={R} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={4} />
          <circle cx={68} cy={68} r={R} fill="none" stroke={hold ? "#E8C547" : "rgba(255,255,255,0.12)"} strokeWidth={4} strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C - (prog / 100) * C} style={{ transition: "stroke 0.2s" }} />
        </svg>
        <button onMouseDown={ps} onMouseUp={pe} onMouseLeave={pe} onTouchStart={ps} onTouchEnd={pe}
          style={{ position: "absolute", inset: 10, borderRadius: "50%", background: hold ? "rgba(232,197,71,0.1)" : "rgba(255,255,255,0.03)", border: `1.5px solid ${hold ? "rgba(232,197,71,0.4)" : "rgba(255,255,255,0.08)"}`, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 5, userSelect: "none", WebkitUserSelect: "none" as any, transition: "all 0.2s" }}>
          <span style={{ fontSize: 26 }}>🏋️</span>
          <span style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", letterSpacing: "0.1em" }}>{hold ? "解除中…" : "HOLD"}</span>
        </button>
      </div>
      <p style={{ fontSize: 11, color: "rgba(255,255,255,0.15)", textAlign: "center", lineHeight: 1.9, marginTop: 20, maxWidth: 200 }}>{HOLD_SEC}秒長押しで解除<br />レストに集中しましょう</p>
      {restSec === 0 && <button onClick={() => { store.del(LS.TIMER); onUnlock(); }} style={{ marginTop: 24, padding: "12px 36px", borderRadius: 12, background: "rgba(74,222,128,0.12)", border: "1px solid rgba(74,222,128,0.3)", color: "#4ade80", fontSize: 13, cursor: "pointer" }}>次のセットへ →</button>}
    </div>
  );
}

// ── Fix 3: 数値直接入力対応 NumInput ─────────────────────────
function NumInput({ value, onCommit, min, step, unit }: { value: number; onCommit: (v: number) => void; min: number; step: number; unit: string }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState("");
  const iref = useRef<HTMLInputElement>(null);

  const open = () => { setDraft(String(value)); setEditing(true); setTimeout(() => iref.current?.select(), 30); };
  const commit = () => {
    const v = parseFloat(draft);
    if (!isNaN(v) && v >= min) onCommit(v);
    setEditing(false);
  };

  if (editing) return (
    <input
      ref={iref}
      type="number"
      inputMode="decimal"
      value={draft}
      onChange={e => setDraft(e.target.value)}
      onBlur={commit}
      onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") setEditing(false); }}
      style={{ width: unit === "kg" ? 60 : 46, fontSize: 20, fontWeight: 700, textAlign: "center", background: "rgba(232,197,71,0.1)", border: "1.5px solid rgba(232,197,71,0.5)", borderRadius: 8, color: "#E8C547", fontFamily: "inherit", outline: "none", padding: "2px 4px", fontVariantNumeric: "tabular-nums" }}
    />
  );

  return (
    <button onClick={open} style={{ textAlign: "center", minWidth: unit === "kg" ? 46 : 36, background: "none", border: "none", cursor: "pointer", padding: 0 }}>
      <div style={{ fontSize: 20, fontWeight: 700, fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", marginTop: 1 }}>{unit}</div>
    </button>
  );
}

              style={{ padding:"5px 13px",borderRadius:20,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",background:tab===c.id?c.color:"rgba(255,255,255,0.04)",border:`1px solid ${tab===c.id?c.color:"rgba(255,255,255,0.06)"}`,color:tab===c.id?"#fff":"rgba(255,255,255,0.4)",fontWeight:tab===c.id?600:400 }}>

            <button key={ex} onClick={() => { onAdd(ex, tab); onClose(); }}
              style={{ display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 13px",borderRadius:10,marginBottom:4,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.05)",color:"#fff",cursor:"pointer",textAlign:"left" }}>
              <div style={{ width:7,height:7,borderRadius:"50%",background:cat.color,flexShrink:0 }} />
              <span style={{ fontSize:14 }}>{ex}</span>

          ))}
        </div>
        <div style={{ padding:"11px 20px 28px",borderTop:"1px solid rgba(255,255,255,0.05)" }}>
          <div style={{ display:"flex",gap:8 }}>
            <input value={custom} onChange={e => setCust(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && custom.trim()) { onAdd(custom.trim(), tab); onClose(); } }}
              placeholder="カスタム種目名 (Enter)"
              style={{ flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:10,padding:"9px 12px",color:"#fff",fontSize:13,fontFamily:"inherit",outline:"none" }} />
            <button onClick={() => { if (custom.trim()) { onAdd(custom.trim(), tab); onClose(); } }}
              style={{ padding:"9px 15px",borderRadius:10,background:"rgba(232,197,71,0.14)",border:"1px solid rgba(232,197,71,0.3)",color:"#E8C547",fontSize:13,cursor:"pointer" }}>
              追加
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── WORKOUT SCREEN ───────────────────────────────────────────
function WorkoutScreen({ exs, setExs, hist, routines, schedule, totalAura, onSaved }: any) {
  const [picker, setPicker] = useState(false), [filter, setFilter] = useState("all");
  // Fix 1: lock は restTotal のみ持つ（restSec は OpalLock 内で管理）
  const [lock, setLock] = useState<any>(null);
  const [running, setRunning] = useState(false), [restSec, setRestSec] = useState(0), [restTot, setRestTot] = useState(0);
  const [bannerOff, setBannerOff] = useState(false), [auraPopup, setAuraPopup] = useState<any>(null);
  const tref = useRef<any>(null);

  useEffect(() => { store.set(LS.SESS, exs); }, [exs]);

  // mini rest bar（lock解除後も残り時間を表示）
  useEffect(() => {
    if (running) {
      tref.current = setInterval(() => setRestSec((s: number) => {
        if (s <= 1) { clearInterval(tref.current); setRunning(false); return 0; }
        return s - 1;
      }), 1000);
    } else clearInterval(tref.current);
    return () => clearInterval(tref.current);
  }, [running]);

  const startLock = useCallback(({ exName, setIdx, restTotal: r }: any) => {
    store.set(LS.TIMER, { startedAt: Date.now(), total: r });
    setRestTot(r); setRestSec(r); setRunning(true);
    setLock({ exName, setIdx, restTotal: r });
  }, []);
  const endLock = useCallback(() => { setLock(null); }, []);

  const addEx = (n: string, c: string) => setExs((p: any[]) => [...p, mkEx(n, c)]);
  const delEx = (id: string) => setExs((p: any[]) => p.filter((e: any) => e.id !== id));
  const updEx = (id: string, ns: any) => setExs((p: any[]) => p.map((e: any) => e.id === id ? { ...e, sets: ns } : e));

  const dow = todayDow(), rid = schedule[DAYS_KEY[dow]], todayR = rid ? routines.find((r: any) => r.id === rid) : null;
  // Fix 2: isBlank — exs が空の場合も考慮
  const isBlank = exs.length === 0 || (exs.length === 1 && exs[0].sets.length === 1 && !exs[0].sets[0].done);
  const apply = (r: any) => {
    setExs(r.items.map((it: any) => ({ ...mkEx(it.name, it.catId), sets: Array.from({ length: it.sets ?? 3 }, () => mkSet()) })));
    setBannerOff(true);
  };
  const visible = filter === "all" ? exs : exs.filter((e: any) => e.catId === filter);
  const tSets = exs.reduce((a: number, e: any) => a + e.sets.length, 0);
  const dSets = exs.reduce((a: number, e: any) => a + e.sets.filter((s: any) => s.done).length, 0);
  const tVol  = exs.reduce((a: number, e: any) => a + e.sets.filter((s: any) => s.done).reduce((b: number, s: any) => b + s.weight * s.reps, 0), 0);
  const allDone = tSets > 0 && dSets === tSets, pct = tSets > 0 ? dSets / tSets : 0;

  const finish = () => {
    const session = {
      id: uid(), date: todayISO(), savedAt: new Date().toISOString(),
      exercises: exs.map((e: any) => ({
        name: e.name, catId: e.catId,
        sets: e.sets.filter((s: any) => s.done).map((s: any) => ({ weight: s.weight, reps: s.reps, done: true }))
      })).filter((e: any) => e.sets.length > 0),
      totalVolume: tVol
    };
    const pts = calcAura(session), pLv = getLevel(totalAura), nT = totalAura + pts, nLv = getLevel(nT), lu = nLv.level > pLv.level;
    store.set(LS.HIST, [session, ...store.get(LS.HIST, [])]);
    store.set(LS.AURA, nT);
    store.del(LS.SESS);
    // Fix 2: 完了後は空配列に戻す
    setExs([]);
    setBannerOff(false);
    setAuraPopup({ pts, levelUp: lu, levelName: nLv.name, levelColor: nLv.color });
    setTimeout(() => { setAuraPopup(null); onSaved(nT); }, 3400);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", flex: 1, overflowY: "auto", position: "relative" }}>
      {/* Fix 1 & 4: OpalLock は position:fixed かつバックグラウンドタイマー対応 */}
      {lock && <OpalLock restTotal={lock.restTotal} exName={lock.exName} setIdx={lock.setIdx} onUnlock={endLock} />}
      {picker && <ExPicker onAdd={addEx} onClose={() => setPicker(false)} />}
      {auraPopup && <AuraPopup {...auraPopup} onClose={() => setAuraPopup(null)} />}

      <div style={{ padding: "18px 16px 0" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: "-0.02em" }}>今日のワークアウト</div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginTop: 2 }}>{DAYS_JA[dow]}曜日 · {exs.length}種目 · {dSets}/{tSets}セット{tVol > 0 ? ` · ${tVol}kg` : ""}</div>
          </div>
          <button onClick={() => setPicker(true)} style={{ display: "flex", alignItems: "center", gap: 5, padding: "7px 13px", borderRadius: 10, background: "rgba(232,197,71,0.12)", border: "1px solid rgba(232,197,71,0.28)", color: "#E8C547", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
            <IPlus size={13} />種目追加
          </button>
        </div>
        <div style={{ height: 3, background: "rgba(255,255,255,0.07)", borderRadius: 2, marginBottom: 14 }}>
          <div style={{ height: "100%", width: `${pct * 100}%`, background: allDone ? "#4ade80" : "linear-gradient(90deg,#E8C547,#F5A623)", borderRadius: 2, transition: "width 0.6s cubic-bezier(0.34,1.56,0.64,1)" }} />
        </div>
      </div>

      <AuraBanner totalPts={totalAura} />
      {todayR && !bannerOff && isBlank && (
        <TodayBanner routine={todayR} onApply={() => apply(todayR)} onDismiss={() => setBannerOff(true)} />
      )}
      <CatFilter active={filter} onChange={setFilter} />

      {running && !lock && (
        <div style={{ margin: "0 14px 10px", padding: "9px 13px", borderRadius: 12, background: "rgba(232,197,71,0.06)", border: "1px solid rgba(232,197,71,0.18)", display: "flex", alignItems: "center", gap: 10 }}>
          <ITimer size={13} stroke="#E8C547" />
          <span style={{ fontSize: 11, color: "#E8C547" }}>レスト中</span>
          <span style={{ fontSize: 17, fontWeight: 700, fontVariantNumeric: "tabular-nums", fontFamily: "monospace" }}>{fmtTime(restSec)}</span>
          <div style={{ flex: 1, height: 2, background: "rgba(255,255,255,0.07)", borderRadius: 1 }}>
            <div style={{ height: "100%", width: `${restTot > 0 ? ((restTot - restSec) / restTot) * 100 : 0}%`, background: "#E8C547", borderRadius: 1, transition: "width 1s linear" }} />
          </div>
          <button onClick={() => { setRunning(false); setRestSec(restTot); }} style={G.btn({ width: 22, height: 22, borderRadius: 6 })}><IX size={9} /></button>
        </div>
      )}

      <div style={{ flex: 1 }}>
        {/* Fix 2: 空の場合のプレースホルダー */}
        {exs.length === 0 && (
          <div style={{ textAlign: "center", padding: "52px 20px", color: "rgba(255,255,255,0.17)" }}>
            <IDumbbell size={34} stroke="rgba(255,255,255,0.12)" />
            <div style={{ fontSize: 13, marginTop: 12 }}>種目を追加してください</div>
          </div>
        )}
        {visible.length === 0 && exs.length > 0 && (
          <div style={{ textAlign: "center", padding: "52px 20px", color: "rgba(255,255,255,0.17)" }}>
            <div style={{ fontSize: 13 }}>このカテゴリの種目はありません</div>
          </div>
        )}
        {visible.map((e: any) => (
          <ExCard key={e.id} ex={e} hist={hist} onUpdateSets={(ns: any) => updEx(e.id, ns)} onDelete={delEx} onLock={startLock} />
        ))}
      </div>

      <div style={{ padding: "12px 14px 0" }}>
        {allDone ? (
          <div style={{ padding: "16px 20px", borderRadius: 14, textAlign: "center", background: "rgba(74,222,128,0.07)", border: "1px solid rgba(74,222,128,0.2)" }}>
            <div style={{ fontSize: 24, marginBottom: 4 }}>🎉</div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#4ade80" }}>ワークアウト完了！</div>
            <div style={{ fontSize: 12, color: "rgba(74,222,128,0.55)", marginTop: 3 }}>総ボリューム {tVol}kg</div>
            <button onClick={finish} style={{ marginTop: 12, padding: "10px 28px", borderRadius: 11, background: "rgba(74,222,128,0.15)", border: "1px solid rgba(74,222,128,0.35)", color: "#4ade80", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
              保存して終了 →
            </button>
          </div>
        ) : (
          <button onClick={() => setPicker(true)} style={{ width: "100%", padding: "12px", borderRadius: 12, background: "rgba(255,255,255,0.025)", border: "1px dashed rgba(255,255,255,0.1)", color: "rgba(255,255,255,0.25)", fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
            <IPlus size={13} />種目を追加する
          </button>
        )}
      </div>
    </div>
  );
}

// ── ROUTINE SCREEN ───────────────────────────────────────────
function RoutineScreen({ routines, setRoutines, schedule, setSchedule, onLoad }: any) {
  const [editing, setEditing] = useState<any>(null), [newName, setNewName] = useState(""), [newEmoji, setNewEmoji] = useState("💪"), [schOpen, setSchOpen] = useState(true);
  const save = (r: any[]) => { setRoutines(r); store.set(LS.ROUT, r); };
  const create = () => { if (!newName.trim()) return; const r = { id: uid(), name: newName.trim(), emoji: newEmoji, items: [] }; save([...routines, r]); setEditing(r); setNewName(""); setNewEmoji("💪"); };
  const remove = (id: string) => { save(routines.filter((r: any) => r.id !== id)); const s = { ...schedule }; Object.keys(s).forEach(k => { if ((s as any)[k] === id) delete (s as any)[k]; }); setSchedule(s); store.set(LS.SCHE, s); };
  const addItem = (rid: string, name: string, catId: string) => { const u = routines.map((r: any) => r.id === rid ? { ...r, items: [...r.items, { name, catId, sets: 3 }] } : r); save(u); setEditing(u.find((r: any) => r.id === rid)); };
  const removeItem = (rid: string, i: number) => { const u = routines.map((r: any) => r.id === rid ? { ...r, items: r.items.filter((_: any, j: number) => j !== i) } : r); save(u); setEditing(u.find((r: any) => r.id === rid)); };
  const changeDS = (rid: string, i: number, v: number) => { const u = routines.map((r: any) => r.id === rid ? { ...r, items: r.items.map((it: any, j: number) => j === i ? { ...it, sets: v } : it) } : r); save(u); setEditing(u.find((r: any) => r.id === rid)); };
  const toggleDay = (day: string, rid: string) => { const s = { ...schedule }; if ((s as any)[day] === rid) delete (s as any)[day]; else (s as any)[day] = rid; setSchedule(s); store.set(LS.SCHE, s); };

  if (editing) {
    const rt = routines.find((r: any) => r.id === editing.id) ?? editing;
    // Fix 6: カスタム種目入力用ローカルstate（関数コンポーネントとして切り出し）
    return <RoutineEditor rt={rt} routines={routines} schedule={schedule} onAddItem={addItem} onRemoveItem={removeItem} onChangeDS={changeDS} onBack={() => setEditing(null)} onLoad={(r: any) => { onLoad(r); setEditing(null); }} />;
  }

  return (
    <div style={{ flex:1,overflowY:"auto",paddingBottom:80 }}>
      <div style={{ margin:"12px 14px",...G.card({padding:"13px"}) }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:schOpen?12:0 }}>
          <div style={{ display:"flex",alignItems:"center",gap:6 }}><ICalendar size={14} stroke="#E8C547" /><span style={{ fontSize:13,fontWeight:600 }}>週間スケジュール</span></div>
          <button onClick={() => setSchOpen((v:boolean) => !v)} style={G.btn({width:24,height:24,borderRadius:6})}>{schOpen?<IChevU size={11}/>:<IChevD size={11}/>}</button>
        </div>
        {schOpen ? (
          <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
            {DAYS_JA.map((d,i) => {
              const key=DAYS_KEY[i];
              return (
                <div key={i} style={{ display:"flex",alignItems:"center",gap:7 }}>
                  <div style={{ width:26,height:26,borderRadius:8,background:"rgba(255,255,255,0.05)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,flexShrink:0,color:todayDow()===i?"#E8C547":"rgba(255,255,255,0.4)" }}>{d}</div>
                  <div style={{ display:"flex",gap:4,flex:1,overflowX:"auto" }}>
                    {routines.map((r:any) => (
                      <button key={r.id} onClick={() => toggleDay(key,r.id)}
                        style={{ padding:"3px 9px",borderRadius:6,fontSize:11,whiteSpace:"nowrap",cursor:"pointer",background:schedule[key]===r.id?"rgba(232,197,71,0.18)":"rgba(255,255,255,0.04)",border:`1px solid ${schedule[key]===r.id?"rgba(232,197,71,0.42)":"rgba(255,255,255,0.07)"}`,color:schedule[key]===r.id?"#E8C547":"rgba(255,255,255,0.32)" }}>
                        {r.emoji} {r.name}
                      </button>
                    ))}
                    {routines.length===0&&<span style={{ fontSize:11,color:"rgba(255,255,255,0.2)" }}>ルーチンを作成してください</span>}
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div style={{ display:"flex",gap:4,marginTop:4 }}>
            {DAYS_JA.map((d,i) => {
              const key=DAYS_KEY[i],assigned=routines.find((r:any)=>r.id===schedule[key]);
              return (
                <div key={i} style={{ flex:1,textAlign:"center" }}>
                  <div style={{ fontSize:10,color:todayDow()===i?"#E8C547":"rgba(255,255,255,0.28)",marginBottom:4 }}>{d}</div>
                  <div style={{ height:4,borderRadius:2,background:assigned?"rgba(232,197,71,0.45)":"rgba(255,255,255,0.07)" }}/>
                  {assigned&&<div style={{ fontSize:9,color:"rgba(232,197,71,0.65)",marginTop:3 }}>{assigned.emoji}</div>}
                </div>
              );
            })}
          </div>
        )}
      </div>
      <div style={{ padding:"0 14px" }}>
        <div style={{ fontSize:11,color:"rgba(255,255,255,0.28)",letterSpacing:"0.06em",marginBottom:8 }}>マイルーチン</div>
        {routines.map((r:any) => {
          const ad=DAYS_KEY.map((k,i)=>schedule[k]===r.id?DAYS_JA[i]:null).filter(Boolean);
          return (
            <div key={r.id} style={{ marginBottom:8,...G.card() }}>
              <div style={{ display:"flex",alignItems:"center",gap:9,padding:"12px 13px" }}>
                <span style={{ fontSize:22,flexShrink:0 }}>{r.emoji}</span>
                <div style={{ flex:1,minWidth:0 }}>
                  <div style={{ fontSize:14,fontWeight:600 }}>{r.name}</div>
                  <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:1 }}>
                    {r.items.length}種目{ad.length>0&&<span style={{ color:"rgba(232,197,71,0.6)",marginLeft:5 }}>{ad.join("・")}曜</span>}
                  </div>
                </div>
                <button onClick={()=>onLoad(r)} style={{...G.btn({width:32,height:32,borderRadius:9}),color:"#E8C547",background:"rgba(232,197,71,0.1)",border:"1px solid rgba(232,197,71,0.22)"}}><IZap size={14}/></button>
                <button onClick={()=>setEditing(r)} style={G.btn({width:32,height:32,borderRadius:9})}><IEdit size={13}/></button>
                <button onClick={()=>remove(r.id)} style={G.btn({width:32,height:32,borderRadius:9,color:"rgba(255,80,80,0.55)"})}><ITrash size={12}/></button>
              </div>
              {r.items.length>0&&(
                <div style={{ display:"flex",flexWrap:"wrap",gap:4,padding:"0 13px 12px" }}>
                  {r.items.map((it:any,i:number)=>{const c=catOf(it.catId);return<span key={i} style={{ fontSize:10,padding:"2px 8px",borderRadius:4,background:`${c.color}18`,color:c.color }}>{it.name}</span>;})}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{ margin:"8px 14px",padding:"13px",borderRadius:13,background:"rgba(255,255,255,0.02)",border:"1px dashed rgba(255,255,255,0.09)" }}>
        <div style={{ fontSize:12,color:"rgba(255,255,255,0.3)",marginBottom:9 }}>新しいルーチンを作成</div>
        <div style={{ display:"flex",gap:8 }}>
          <input value={newEmoji} onChange={e=>setNewEmoji(e.target.value)} style={{ width:42,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,padding:"8px",color:"#fff",fontSize:18,textAlign:"center",fontFamily:"inherit",outline:"none" }}/>
          <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&create()} placeholder="ルーチン名（例: 胸の日）" style={{ flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:9,padding:"8px 12px",color:"#fff",fontSize:13,fontFamily:"inherit",outline:"none" }}/>
          <button onClick={create} style={{...G.btn({width:40,height:40,borderRadius:9}),background:"rgba(232,197,71,0.12)",border:"1px solid rgba(232,197,71,0.28)",color:"#E8C547"}}><IPlus size={15}/></button>
        </div>
      </div>
    </div>
  );
}

// Fix 6: RoutineEditor を独立コンポーネントとして分離（Hooksルール遵守）
function RoutineEditor({ rt, onAddItem, onRemoveItem, onChangeDS, onBack, onLoad }: any) {
  const [customEx, setCustomEx] = useState("");

  return (
    <div style={{ flex: 1, overflowY: "auto", paddingBottom: 80 }}>
      <div style={{ display:"flex",alignItems:"center",gap:10,padding:"16px 16px 13px",borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
        <button onClick={onBack} style={G.btn({width:32,height:32,borderRadius:9})}><IChevD size={14} /></button>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:15,fontWeight:700 }}>{rt.emoji} {rt.name}</div>
          <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:1 }}>{rt.items.length}種目</div>
        </div>
        <button onClick={() => onLoad(rt)} style={{ display:"flex",alignItems:"center",gap:5,padding:"7px 13px",borderRadius:10,background:"rgba(232,197,71,0.14)",border:"1px solid rgba(232,197,71,0.3)",color:"#E8C547",fontSize:12,fontWeight:600,cursor:"pointer" }}>
          <IZap size={12} />今日に適用
        </button>
      </div>
      <div style={{ padding:"12px 14px" }}>
        {rt.items.length===0 && <div style={{ textAlign:"center",padding:"28px 0",color:"rgba(255,255,255,0.2)",fontSize:13 }}>種目を追加してください</div>}
        {rt.items.map((it:any,i:number)=>{
          const c=catOf(it.catId);
          return (
            <div key={i} style={{ display:"flex",alignItems:"center",gap:8,padding:"10px 13px",marginBottom:5,...G.card() }}>
              <div style={{ width:7,height:7,borderRadius:"50%",background:c.color,flexShrink:0 }}/>
              <span style={{ flex:1,fontSize:13,fontWeight:500 }}>{it.name}</span>
              <div style={{ display:"flex",alignItems:"center",gap:4 }}>
                <button onClick={()=>onChangeDS(rt.id,i,Math.max(1,it.sets-1))} style={G.btn({width:22,height:22,borderRadius:6})}><IMinus size={9}/></button>
                <span style={{ fontSize:12,minWidth:26,textAlign:"center",color:"rgba(255,255,255,0.65)" }}>{it.sets}set</span>
                <button onClick={()=>onChangeDS(rt.id,i,Math.min(8,it.sets+1))} style={G.btn({width:22,height:22,borderRadius:6})}><IPlus size={9}/></button>
              </div>
              <button onClick={()=>onRemoveItem(rt.id,i)} style={G.btn({width:26,height:26,borderRadius:7,color:"rgba(255,80,80,0.6)"})}><IX size={10}/></button>
            </div>
          );
        })}
      </div>
      <div style={{ padding:"0 14px" }}>
        <div style={{ ...G.card() }}>
          <div style={{ padding:"9px 13px",fontSize:12,color:"rgba(255,255,255,0.3)",borderBottom:"1px solid rgba(255,255,255,0.04)" }}>＋ 種目を追加</div>
          {/* Fix 6: カスタム種目 自由テキスト入力 */}
          <div style={{ padding:"10px 13px",borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
            <div style={{ display:"flex",gap:8 }}>
              <input
                value={customEx}
                onChange={e => setCustomEx(e.target.value)}
                onKeyDown={e => {
                  if (e.key==="Enter" && customEx.trim()) {
                    onAddItem(rt.id, customEx.trim(), CATS[0].id);
                    setCustomEx("");
                  }
                }}
                placeholder="カスタム種目を自由入力 (Enter)"
                style={{ flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:9,padding:"8px 12px",color:"#fff",fontSize:12,fontFamily:"inherit",outline:"none" }}
              />
              <button
                onClick={() => { if(customEx.trim()){ onAddItem(rt.id,customEx.trim(),CATS[0].id); setCustomEx(""); } }}
                style={{ padding:"8px 13px",borderRadius:9,background:"rgba(232,197,71,0.12)",border:"1px solid rgba(232,197,71,0.28)",color:"#E8C547",fontSize:12,cursor:"pointer" }}>
                追加
              </button>
            </div>
          </div>
          {CATS.map(cat => (
            <div key={cat.id}>
              <div style={{ padding:"6px 13px",fontSize:10,color:"rgba(255,255,255,0.22)",letterSpacing:"0.06em",borderTop:"1px solid rgba(255,255,255,0.03)" }}>{cat.label}</div>
              <div style={{ display:"flex",flexWrap:"wrap",gap:5,padding:"4px 13px 10px" }}>
                {cat.exs.map(ex => (
                  <button key={ex} onClick={() => onAddItem(rt.id,ex,cat.id)}
                    style={{ padding:"3px 9px",borderRadius:6,fontSize:11,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.42)",cursor:"pointer" }}>
                    {ex}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── HISTORY SCREEN ───────────────────────────────────────────
function HistoryScreen({ hist, onDelete }: any) {
  const [detail, setDetail] = useState<any>(null), [subTab, setSubTab] = useState("log");
  const grouped: any = {};
  hist.forEach((s: any) => {
    const d=new Date(s.date),mon=new Date(d);
    mon.setDate(d.getDate()-((d.getDay()+6)%7));
    const wk=mon.toISOString().slice(0,10);
    if(!grouped[wk])grouped[wk]=[];grouped[wk].push(s);
  });
  const weeks = Object.keys(grouped).sort().reverse();
  return (
    <div style={{ flex:1,display:"flex",flexDirection:"column",overflowY:"auto",position:"relative" }}>
      <div style={{ display:"flex",padding:"8px 14px 0",gap:6,flexShrink:0 }}>
        {[{id:"log",label:"📋 ログ"},{id:"1rm",label:"📈 1RMグラフ"}].map(t => (
          <button key={t.id} onClick={() => setSubTab(t.id)}
            style={{ padding:"6px 16px",borderRadius:20,fontSize:12,cursor:"pointer",background:subTab===t.id?"rgba(232,197,71,0.15)":"rgba(255,255,255,0.04)",border:`1px solid ${subTab===t.id?"rgba(232,197,71,0.4)":"rgba(255,255,255,0.07)"}`,color:subTab===t.id?"#E8C547":"rgba(255,255,255,0.35)",fontWeight:subTab===t.id?700:400 }}>
            {t.label}
          </button>
        ))}
      </div>
      {subTab === "1rm" && <RMScreen hist={hist} />}
      {subTab === "log" && (hist.length === 0 ?
        <div style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,color:"rgba(255,255,255,0.2)",padding:"60px 20px" }}>
          <IHistory size={40} stroke="rgba(255,255,255,0.1)" />
          <div style={{ fontSize:14 }}>まだ記録がありません</div>
        </div> :
        <div style={{ flex:1,overflowY:"auto",paddingBottom:80,position:"relative" }}>
          {detail && (
            <div style={{ position:"fixed",inset:0,zIndex:150,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end" }} onClick={() => setDetail(null)}>
              <div style={{ width:"100%",maxHeight:"88vh",background:"#0C0C1C",borderRadius:"18px 18px 0 0",display:"flex",flexDirection:"column",overflow:"hidden" }} onClick={e => e.stopPropagation()}>
                <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"17px 20px 13px",borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                  <div>
                    <div style={{ fontSize:15,fontWeight:700 }}>{fmtDate(detail.date)}</div>
                    <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2 }}>総ボリューム {detail.totalVolume}kg · {detail.exercises.length}種目</div>
                  </div>
                  <div style={{ display:"flex",gap:8 }}>
                    <button onClick={() => { onDelete(detail.id); setDetail(null); }} style={G.btn({width:32,height:32,borderRadius:9,color:"rgba(255,80,80,0.65)"})}><ITrash size={13} /></button>
                    <button onClick={() => setDetail(null)} style={G.btn({width:32,height:32,borderRadius:9})}><IX size={13} /></button>
                  </div>
                </div>
                <div style={{ overflowY:"auto",flex:1,padding:"12px 20px 28px" }}>
                  {detail.exercises.map((ex:any,i:number) => {
                    const c=catOf(ex.catId),bR=ex.sets.reduce((b:number,s:any)=>{const rm=e1rm(s.weight,s.reps);return rm>b?rm:b;},0);
                    return (
                      <div key={i} style={{ marginBottom:12,padding:"13px 15px",borderRadius:11,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)" }}>
                        <div style={{ display:"flex",alignItems:"center",gap:7,marginBottom:9 }}>
                          <div style={{ width:7,height:7,borderRadius:"50%",background:c.color }}/>
                          <span style={{ fontSize:13,fontWeight:600 }}>{ex.name}</span>
                          <span style={{ marginLeft:"auto",fontSize:10,color:c.color }}>1RM≈{bR}kg</span>
                        </div>
                        {ex.sets.map((s:any,j:number) => (
                          <div key={j} style={{ display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderTop:j>0?"1px solid rgba(255,255,255,0.04)":"none" }}>
                            <span style={{ fontSize:10,color:"rgba(255,255,255,0.22)",fontFamily:"monospace",width:16 }}>S{j+1}</span>
                            <span style={{ fontSize:14,fontWeight:600 }}>{s.weight}<span style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>kg</span></span>
                            <span style={{ fontSize:12,color:"rgba(255,255,255,0.3)" }}>×</span>
                            <span style={{ fontSize:14,fontWeight:600 }}>{s.reps}<span style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>reps</span></span>
                            <span style={{ marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,0.22)" }}>{s.weight*s.reps}kg</span>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
          {weeks.map(wk => {
            const sessions=grouped[wk],wkVol=sessions.reduce((a:number,s:any)=>a+(s.totalVolume??0),0),wkDate=new Date(wk);
            return (
              <div key={wk} style={{ marginBottom:20 }}>
                <div style={{ display:"flex",alignItems:"baseline",justifyContent:"space-between",padding:"0 16px",marginBottom:6 }}>
                  <span style={{ fontSize:11,color:"rgba(255,255,255,0.27)" }}>{wkDate.getMonth()+1}/{wkDate.getDate()}の週</span>
                  <span style={{ fontSize:11,color:"rgba(255,255,255,0.22)" }}>{wkVol.toLocaleString()}kg</span>
                </div>
                {sessions.map((s:any) => {
                  const cats=[...new Set(s.exercises.map((e:any)=>e.catId))];
                  return (
                    <button key={s.id} onClick={()=>setDetail(s)}
                      style={{ display:"flex",alignItems:"center",gap:11,width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.02)",border:"none",borderBottom:"1px solid rgba(255,255,255,0.04)",color:"#fff",cursor:"pointer",textAlign:"left" }}>
                      <div style={{ flexShrink:0,textAlign:"center",minWidth:32 }}>
                        <div style={{ fontSize:19,fontWeight:800,lineHeight:1 }}>{new Date(s.date).getDate()}</div>
                        <div style={{ fontSize:10,color:"rgba(255,255,255,0.32)",marginTop:1 }}>{DAYS_JA[new Date(s.date).getDay()]}</div>
                      </div>
                      <div style={{ width:1,height:30,background:"rgba(255,255,255,0.07)",flexShrink:0 }}/>
                      <div style={{ flex:1,minWidth:0 }}>
                        <div style={{ display:"flex",gap:3,marginBottom:4 }}>
                          {(cats as string[]).map(catId=>{const c=CATS.find(x=>x.id===catId);if(!c)return null;return<span key={catId} style={{ fontSize:10,padding:"1px 6px",borderRadius:3,background:`${c.color}20`,color:c.color,fontWeight:600 }}>{c.label}</span>;})}
                        </div>
                        <div style={{ fontSize:12,color:"rgba(255,255,255,0.38)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>{s.exercises.map((e:any)=>e.name).join(" · ")}</div>
                      </div>
                      <div style={{ textAlign:"right",flexShrink:0 }}>
                        <div style={{ fontSize:14,fontWeight:700 }}>{(s.totalVolume??0).toLocaleString()}</div>
                        <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>kg</div>
                      </div>
                      <IChevR size={13} stroke="rgba(255,255,255,0.22)" />
                    </button>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── BOTTOM NAV ───────────────────────────────────────────────
function BottomNav({ tab, onChange, histN }: any) {
  const tabs = [
    {id:"workout",label:"トレーニング",icon:<IDumbbell size={19}/>},
    {id:"routine",label:"ルーチン",icon:<IList size={19}/>},
    {id:"history",label:"履歴",icon:<IHistory size={19}/>},
  ];
  return (
    <div style={{ borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",background:"rgba(8,8,16,0.97)",flexShrink:0 }}>
      {tabs.map(t => {
        const s=tab===t.id;
        return (
          <button key={t.id} onClick={()=>onChange(t.id)}
            style={{ flex:1,padding:"10px 0 14px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",color:s?"#E8C547":"rgba(255,255,255,0.32)",cursor:"pointer",transition:"color 0.2s",position:"relative" }}>
            {t.id==="history"&&histN>0&&(
              <div style={{ position:"absolute",top:8,right:"calc(50% - 18px)",width:15,height:15,borderRadius:"50%",background:"#E8C547",color:"#000",fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center" }}>
                {histN>9?"9+":histN}
              </div>
            )}
            {t.icon}
            <span style={{ fontSize:10,fontWeight:s?600:400 }}>{t.label}</span>
            {s&&<div style={{ position:"absolute",top:0,left:"20%",right:"20%",height:2,background:"#E8C547",borderRadius:"0 0 2px 2px" }}/>}
          </button>
        );
      })}
    </div>
  );
}

// ── ROOT ─────────────────────────────────────────────────────
export default function App() {
  usePWAMeta();
  const [tab, setTab]             = useState("workout");
  const [hist, setHist]           = useState(() => store.get(LS.HIST, []));
  const [routines, setRoutines]   = useState(() => { const r = store.get(LS.ROUT, null); return r?.length > 0 ? r : DEFAULT_ROUTINES; });
  const [schedule, setSchedule]   = useState(() => store.get(LS.SCHE, {}));
  // Fix 2: 起動時の初期種目は空配列（セッション保存がある場合のみ復元）
  const [exs, setExs]             = useState(() => { const s = store.get(LS.SESS, null); return Array.isArray(s) && s.length > 0 ? s : []; });
  const [totalAura, setTotalAura] = useState(() => store.get(LS.AURA, 0));

  const delHist = (id: string) => { const h = hist.filter((x: any) => x.id !== id); setHist(h); store.set(LS.HIST, h); };
  const onSaved = (a: number) => { setHist(store.get(LS.HIST, [])); if (a !== undefined) setTotalAura(a); setTab("history"); };
  const loadRoutine = (r: any) => {
    setExs(r.items.length > 0
      ? r.items.map((it: any) => ({ ...mkEx(it.name, it.catId), sets: Array.from({ length: it.sets ?? 3 }, () => mkSet()) }))
      : []
    );
    setTab("workout");
  };

  return (
    <div style={{ ...G.app, height: "100%" }}>
      {tab === "workout" && (
        <WorkoutScreen exs={exs} setExs={setExs} hist={hist} routines={routines} schedule={schedule} totalAura={totalAura} onSaved={onSaved} />
      )}
      {tab === "routine" && (
        <>
          <div style={{ padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0 }}>
            <div style={{ fontSize:18,fontWeight:700,letterSpacing:"-0.02em" }}>トレーニングルーチン</div>
            <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2 }}>{routines.length}件 · 曜日スケジュール</div>
          </div>
          <RoutineScreen routines={routines} setRoutines={setRoutines} schedule={schedule} setSchedule={setSchedule} onLoad={loadRoutine} />
        </>
      )}
      {tab === "history" && (
        <>
          <div style={{ padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0 }}>
            <div style={{ fontSize:18,fontWeight:700,letterSpacing:"-0.02em" }}>トレーニング履歴</div>
            <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2 }}>{hist.length}回のセッション</div>
          </div>
          <HistoryScreen hist={hist} onDelete={delHist} />
        </>
      )}
      <BottomNav tab={tab} onChange={setTab} histN={hist.length} />
    </div>
  );
}


        /* ==========================================
           ↑↑↑ ここまで ↑↑↑
           ========================================== */

        // アプリを画面に表示する命令
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
