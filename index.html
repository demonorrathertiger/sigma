<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>sigma</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="sigma"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080810"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;background:#080810;overscroll-behavior:none}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
input,button{font-family:inherit;-webkit-appearance:none;appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo}=React;

const Svg=({d,size=16,stroke="currentColor",fill="none",sw=1.8})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}>
    {[].concat(d).map((p,i)=><path key={i} d={p}/>)}
  </svg>
);
const IPlus    =p=><Svg {...p} d="M12 5v14M5 12h14"/>;
const IMinus   =p=><Svg {...p} d="M5 12h14"/>;
const ICheck   =p=><Svg {...p} d="M20 6L9 17l-5-5"/>;
const ILock    =p=><Svg {...p} d="M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2zM7 11V7a5 5 0 0110 0v4"/>;
const ITimer   =p=><Svg {...p} d="M12 2a10 10 0 100 20A10 10 0 0012 2zM12 6v6l4 2"/>;
const IChevU   =p=><Svg {...p} d="M18 15l-6-6-6 6"/>;
const IChevD   =p=><Svg {...p} d="M6 9l6 6 6-6"/>;
const IChevR   =p=><Svg {...p} d="M9 18l6-6-6-6"/>;
const IX       =p=><Svg {...p} d="M18 6L6 18M6 6l12 12"/>;
const ISearch  =p=><Svg {...p} d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>;
const IDumbbell=p=><Svg {...p} d={["M6.5 6.5h11","M6.5 17.5h11","M3 9h3.5v6H3","M17.5 9H21v6h-3.5","M6.5 12h11"]} sw={1.6}/>;
const IHistory =p=><Svg {...p} d="M12 8v4l3 3M3.05 11a9 9 0 1 0 .5-3M3 4v4h4"/>;
const ITrash   =p=><Svg {...p} d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>;
const ICalendar=p=><Svg {...p} d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z"/>;
const IList    =p=><Svg {...p} d={["M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2","M9 12h6","M9 16h4","M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"]}/>;
const IEdit    =p=><Svg {...p} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>;
const IZap     =p=><Svg {...p} d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>;
const IStar    =p=><Svg {...p} d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="currentColor"/>;
const ITrend   =p=><Svg {...p} d="M22 7l-8.5 8.5-5-5L2 17M22 7h-6M22 7v6"/>;

const CATS=[
  {id:"chest",   label:"胸",  color:"#E8613A",exs:["ベンチプレス","インクラインプレス","ダンベルフライ","ケーブルクロス","ディップス"]},
  {id:"shoulder",label:"肩",  color:"#E8A83A",exs:["ショルダープレス","サイドレイズ","フロントレイズ","フェイスプル","リアデルト"]},
  {id:"back",    label:"背中",color:"#3AC8E8",exs:["デッドリフト","ラットプルダウン","チンニング","バーベルロウ","シーテッドロウ"]},
  {id:"legs",    label:"脚",  color:"#7EC83A",exs:["スクワット","レッグプレス","ルーマニアンデッドリフト","レッグカール","カーフレイズ"]},
  {id:"arms",    label:"腕",  color:"#B83AE8",exs:["バーベルカール","アームカール","トライセプスプレスダウン","スカルクラッシャー","ハンマーカール"]},
];
const REST_OPTS=[60,90,120,180,240];
const HOLD_SEC=5;
const DAYS_JA=["日","月","火","水","木","金","土"];
const DAYS_KEY=["sun","mon","tue","wed","thu","fri","sat"];
const LS={HIST:"gl_hist_v1",SESS:"gl_sess_v1",ROUT:"gl_rout_v1",SCHE:"gl_sche_v1",AURA:"gl_aura_v1"};
const DEFAULT_ROUTINES=[
  {id:"dr1",name:"胸の日",     emoji:"💪",items:[{name:"ベンチプレス",catId:"chest",sets:4},{name:"インクラインプレス",catId:"chest",sets:3},{name:"ダンベルフライ",catId:"chest",sets:3}]},
  {id:"dr2",name:"脚の日",     emoji:"🦵",items:[{name:"スクワット",catId:"legs",sets:4},{name:"レッグプレス",catId:"legs",sets:3},{name:"レッグカール",catId:"legs",sets:3}]},
  {id:"dr3",name:"背中の日",   emoji:"🏋️",items:[{name:"デッドリフト",catId:"back",sets:4},{name:"ラットプルダウン",catId:"back",sets:3},{name:"チンニング",catId:"back",sets:3}]},
  {id:"dr4",name:"プッシュデイ",emoji:"🙌",items:[{name:"ベンチプレス",catId:"chest",sets:4},{name:"ショルダープレス",catId:"shoulder",sets:3},{name:"サイドレイズ",catId:"shoulder",sets:3}]},
];

const AURA_LEVELS=[
  {level:1,name:"ビギナー", minPts:   0,color:"#6B7280",glow:"rgba(107,114,128,0.3)",emoji:"🌱"},
  {level:2,name:"boy",      minPts:  50,color:"#7EC83A",glow:"rgba(126,200,58,0.35)",emoji:"⚡"},
  {level:3,name:"man",      minPts: 300,color:"#E8A83A",glow:"rgba(232,168,58,0.4)", emoji:"🔥"},
  {level:4,name:"sigma boy",minPts:2500,color:"#E8613A",glow:"rgba(232,97,58,0.45)", emoji:"👑"},
  {level:5,name:"Sigma",    minPts:5000,color:"#B83AE8",glow:"rgba(184,58,232,0.5)", emoji:"Σ"},
];

const calcAuraFromSession=s=>{
  const sets=s.exercises.reduce((a,e)=>a+e.sets.length,0);
  const vol=Math.floor((s.totalVolume??0)/1000);
  return sets*1+vol+5;
};
const getAuraLevel=pts=>{let lv=AURA_LEVELS[0];for(const l of AURA_LEVELS){if(pts>=l.minPts)lv=l;}return lv;};
const getNextLevel=pts=>{for(const l of AURA_LEVELS){if(pts<l.minPts)return l;}return null;};

const uid=()=>Math.random().toString(36).slice(2,9);
const fmtTime=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
const fmtDate=iso=>{const d=new Date(iso);return `${d.getMonth()+1}/${d.getDate()}(${DAYS_JA[d.getDay()]})`;};
const fmtDateShort=iso=>{const d=new Date(iso);return `${d.getMonth()+1}/${d.getDate()}`;};
const todayISO=()=>new Date().toISOString().slice(0,10);
const todayDow=()=>new Date().getDay();
const catOf=id=>CATS.find(c=>c.id===id)??CATS[0];
const mkSet=prev=>({id:uid(),weight:prev?.weight??60,reps:prev?.reps??10,done:false,rest:prev?.rest??90});
const mkEx=(name,catId)=>({id:uid(),name,catId,sets:[mkSet()]});
const epley1RM=(w,r)=>r===1?w:Math.round(w*(1+r/30));

const store={
  get:(k,fb)=>{try{const v=JSON.parse(localStorage.getItem(k));return v!=null?v:fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del:(k)=>{try{localStorage.removeItem(k);}catch{}},
};

const getPrev=(hist,name)=>{
  for(const s of hist){const ex=s.exercises?.find(e=>e.name===name);if(ex?.sets?.length){const best=ex.sets.reduce((a,b)=>b.weight>a.weight?b:a,ex.sets[0]);return{weight:best.weight,reps:best.reps,date:s.date};}}
  return null;
};
const get1RMHistory=(hist,exName)=>{
  const pts=[],seen=new Set();
  for(const s of [...hist].reverse()){if(seen.has(s.date))continue;const ex=s.exercises?.find(e=>e.name===exName);if(ex?.sets?.length){const best=ex.sets.reduce((a,b)=>epley1RM(b.weight,b.reps)>epley1RM(a.weight,a.reps)?b:a,ex.sets[0]);pts.push({date:s.date,rm:epley1RM(best.weight,best.reps),weight:best.weight,reps:best.reps});seen.add(s.date);}}
  return pts;
};

const G={
  app:{minHeight:"100%",background:"#080810",color:"#fff",fontFamily:"'Helvetica Neue','Hiragino Sans','Noto Sans JP',sans-serif",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",fontSize:14},
  btn:(o={})=>({display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",color:"rgba(255,255,255,0.5)",borderRadius:8,cursor:"pointer",padding:0,transition:"all 0.15s",...o}),
  card:(o={})=>({borderRadius:14,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",overflow:"hidden",...o}),
};

function AuraBanner({totalPts}){
  const lv=getAuraLevel(totalPts),next=getNextLevel(totalPts);
  const pct=next?Math.min(100,((totalPts-lv.minPts)/(next.minPts-lv.minPts))*100):100;
  const isSigma=lv.level===5;
  return(
    <div style={{margin:"0 14px 12px",padding:"15px 16px",borderRadius:15,background:isSigma?"linear-gradient(135deg,rgba(184,58,232,0.14),rgba(232,97,58,0.09))":"rgba(255,255,255,0.025)",border:`1px solid ${isSigma?"rgba(184,58,232,0.4)":"rgba(255,255,255,0.07)"}`,boxShadow:isSigma?"0 0 32px rgba(184,58,232,0.16)":"none",transition:"all 0.7s"}}>
      <div style={{display:"flex",alignItems:"center",gap:13}}>
        <div style={{width:52,height:52,borderRadius:14,flexShrink:0,background:`${lv.color}16`,border:`2px solid ${lv.color}60`,boxShadow:`0 0 20px ${lv.glow}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:lv.emoji==="Σ"?24:26,fontWeight:900,color:lv.color,fontFamily:"Georgia,serif",transition:"all 0.7s"}}>
          {lv.emoji}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:7}}>
            <div style={{display:"flex",alignItems:"baseline",gap:6}}>
              <span style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"0.12em",fontWeight:600}}>AURA RANK</span>
              <span style={{fontSize:16,fontWeight:900,color:lv.color,letterSpacing:"-0.02em"}}>{lv.name}</span>
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:2}}>
              <span style={{fontSize:22,fontWeight:900,fontVariantNumeric:"tabular-nums",color:"#fff",letterSpacing:"-0.05em"}}>{totalPts.toLocaleString()}</span>
              <span style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginLeft:2,letterSpacing:"0.06em"}}>AP</span>
            </div>
          </div>
          {next?(
            <>
              <div style={{position:"relative",height:7,background:"rgba(255,255,255,0.05)",borderRadius:4,overflow:"hidden",border:"1px solid rgba(255,255,255,0.05)"}}>
                <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct}%`,background:`linear-gradient(90deg,${lv.color}99,${lv.color})`,borderRadius:4,transition:"width 1.1s cubic-bezier(0.34,1.4,0.64,1)",boxShadow:`0 0 10px ${lv.glow}`}}/>
                {[25,50,75].map(t=><div key={t} style={{position:"absolute",left:`${t}%`,top:0,bottom:0,width:1,background:"rgba(0,0,0,0.35)"}}/>)}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:5}}>
                <span style={{fontSize:9,color:"rgba(255,255,255,0.22)"}}>{next.emoji} <span style={{color:next.color,fontWeight:700}}>{next.name}</span> まで <span style={{color:"rgba(255,255,255,0.5)",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{(next.minPts-totalPts).toLocaleString()} AP</span></span>
                <span style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontVariantNumeric:"tabular-nums"}}>{Math.floor(pct)}%</span>
              </div>
            </>
          ):(
            <>
              <div style={{height:7,borderRadius:4,overflow:"hidden",background:"linear-gradient(90deg,#3AC8E8,#B83AE8,#E8613A,#E8C547)"}}>
                <div style={{position:"absolute" /* dummy */}}/>
              </div>
              <div style={{fontSize:9,color:"rgba(184,58,232,0.75)",marginTop:5,letterSpacing:"0.14em",fontWeight:700}}>∞ MAXIMUM RANK · SIGMA</div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function AuraPopup({pts,levelUp,levelName,levelColor,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3200);return()=>clearTimeout(t);},[onClose]);
  return(
    <div style={{position:"absolute",top:72,left:"50%",transform:"translateX(-50%)",zIndex:200,pointerEvents:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:7}}>
      <div style={{padding:"10px 22px",borderRadius:50,background:"rgba(232,197,71,0.16)",border:"1px solid rgba(232,197,71,0.45)",display:"flex",alignItems:"center",gap:8}}>
        <IStar size={13} stroke="none" fill="#E8C547"/>
        <span style={{fontSize:14,fontWeight:800,color:"#E8C547",letterSpacing:"-0.02em"}}>+{pts} Aura Points</span>
      </div>
      {levelUp&&<div style={{padding:"7px 18px",borderRadius:50,background:`${levelColor}22`,border:`1px solid ${levelColor}55`,fontSize:12,color:levelColor,fontWeight:800}}>✦ RANK UP → {levelName}</div>}
    </div>
  );
}

function RMChart({data,color}){
  if(!data||data.length<2)return<div style={{padding:"16px 0",textAlign:"center",color:"rgba(255,255,255,0.2)",fontSize:12}}>データが2件以上必要です</div>;
  const W=300,H=100,PAD={t:10,b:24,l:38,r:12},innerW=W-PAD.l-PAD.r,innerH=H-PAD.t-PAD.b;
  const rms=data.map(d=>d.rm),minRM=Math.min(...rms),maxRM=Math.max(...rms),range=maxRM-minRM||1;
  const xS=i=>PAD.l+(i/(data.length-1))*innerW,yS=v=>PAD.t+innerH-((v-minRM)/range)*innerH;
  const pts=data.map((d,i)=>`${xS(i)},${yS(d.rm)}`).join(" ");
  const area=`M${xS(0)},${yS(data[0].rm)} `+data.slice(1).map((d,i)=>`L${xS(i+1)},${yS(d.rm)}`).join(" ")+` L${xS(data.length-1)},${H-PAD.b} L${xS(0)},${H-PAD.b} Z`;
  const maxIdx=rms.indexOf(maxRM),lbls=new Set([0,data.length-1,maxIdx]);
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      <defs><linearGradient id="rmGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.25"/><stop offset="100%" stopColor={color} stopOpacity="0.02"/></linearGradient></defs>
      {[0,0.5,1].map((f,i)=>{const y=PAD.t+innerH*(1-f),v=Math.round(minRM+range*f);return<g key={i}><line x1={PAD.l} y1={y} x2={W-PAD.r} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth={1} strokeDasharray="3 3"/><text x={PAD.l-4} y={y+4} textAnchor="end" fill="rgba(255,255,255,0.25)" fontSize={9}>{v}</text></g>;})}
      <path d={area} fill="url(#rmGrad)"/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
      {data.map((d,i)=>{const x=xS(i),y=yS(d.rm),s=lbls.has(i);return<g key={i}><circle cx={x} cy={y} r={s?4:2.5} fill={color} stroke="#080810" strokeWidth={1.5}/>{s&&<><text x={x} y={y-8} textAnchor="middle" fill={color} fontSize={9} fontWeight="bold">{d.rm}kg</text><text x={x} y={H-PAD.b+13} textAnchor="middle" fill="rgba(255,255,255,0.28)" fontSize={8}>{fmtDateShort(d.date)}</text></>}</g>;})}
    </svg>
  );
}

function RMScreen({hist}){
  const exNames=useMemo(()=>{const s=new Set();hist.forEach(h=>h.exercises?.forEach(e=>s.add(e.name)));return[...s];},[hist]);
  const[selEx,setSelEx]=useState(exNames[0]??"");
  useEffect(()=>{if(exNames.length>0&&!exNames.includes(selEx))setSelEx(exNames[0]);},[exNames,selEx]);
  const data=useMemo(()=>selEx?get1RMHistory(hist,selEx):[],[hist,selEx]);
  const cat=useMemo(()=>{for(const s of hist){const ex=s.exercises?.find(e=>e.name===selEx);if(ex)return catOf(ex.catId);}return CATS[0];},[hist,selEx]);
  const bestRM=data.length>0?Math.max(...data.map(d=>d.rm)):0;
  const latest=data.length>0?data[data.length-1]:null;
  const prev=data.length>1?data[data.length-2]:null;
  const diff=latest&&prev?latest.rm-prev.rm:0;
  if(!exNames.length)return<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,color:"rgba(255,255,255,0.2)",padding:"60px 20px"}}><ITrend size={40} stroke="rgba(255,255,255,0.1)"/><div style={{fontSize:14}}>履歴がまだありません</div></div>;
  return(
    <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>
      <div style={{display:"flex",gap:5,overflowX:"auto",padding:"12px 14px 8px",flexShrink:0}}>
        {exNames.map(n=>{const c=(()=>{for(const s of hist){const ex=s.exercises?.find(e=>e.name===n);if(ex)return catOf(ex.catId);}return CATS[0];})();return<button key={n} onClick={()=>setSelEx(n)} style={{padding:"4px 11px",borderRadius:20,fontSize:11,whiteSpace:"nowrap",cursor:"pointer",background:selEx===n?`${c.color}22`:"rgba(255,255,255,0.04)",border:`1px solid ${selEx===n?`${c.color}55`:"rgba(255,255,255,0.07)"}`,color:selEx===n?c.color:"rgba(255,255,255,0.35)",fontWeight:selEx===n?700:400}}>{n}</button>;})}
      </div>
      <div style={{display:"flex",gap:8,padding:"0 14px 14px"}}>
        {[{label:"推定1RM (最高)",value:`${bestRM}kg`,color:cat.color},{label:"最新",value:latest?`${latest.rm}kg`:"—",color:"rgba(255,255,255,0.7)"},{label:"前回比",value:diff===0?"±0":diff>0?`+${diff}kg`:`${diff}kg`,color:diff>0?"#4ade80":diff<0?"#f87171":"rgba(255,255,255,0.4)"}].map((s,i)=>(
          <div key={i} style={{flex:1,padding:"10px 11px",borderRadius:11,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",minWidth:0}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.28)",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.label}</div>
            <div style={{fontSize:17,fontWeight:700,color:s.color,fontVariantNumeric:"tabular-nums"}}>{s.value}</div>
          </div>
        ))}
      </div>
      <div style={{margin:"0 14px 16px",padding:"14px 12px 8px",borderRadius:13,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}><ITrend size={13} stroke={cat.color}/><span style={{fontSize:12,fontWeight:600,color:cat.color}}>{selEx} — 推定1RM推移</span><span style={{marginLeft:"auto",fontSize:10,color:"rgba(255,255,255,0.22)"}}>Epley式</span></div>
        <RMChart data={data} color={cat.color}/>
      </div>
      {data.length>0&&<div style={{margin:"0 14px",...G.card()}}><div style={{padding:"9px 13px",fontSize:11,color:"rgba(255,255,255,0.28)",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>セッション別ベストセット</div>{[...data].reverse().slice(0,10).map((d,i)=><div key={i} style={{display:"flex",alignItems:"center",padding:"9px 13px",borderBottom:"1px solid rgba(255,255,255,0.04)",gap:10}}><span style={{fontSize:11,color:"rgba(255,255,255,0.3)",minWidth:42}}>{fmtDateShort(d.date)}</span><span style={{fontSize:13}}>{d.weight}kg × {d.reps}reps</span><span style={{marginLeft:"auto",fontSize:14,fontWeight:700,color:cat.color}}>≈{d.rm}kg</span></div>)}</div>}
    </div>
  );
}

function OpalLock({restSec,restTotal,exName,setIdx,onUnlock}){
  const[prog,setProg]=useState(0),[hold,setHold]=useState(false),iref=useRef(null);
  const pointerStart=useCallback(e=>{e.preventDefault();setHold(true);iref.current=setInterval(()=>setProg(p=>{const n=p+100/(HOLD_SEC*20);if(n>=100){clearInterval(iref.current);onUnlock();return 100;}return n;}),50);},[onUnlock]);
  const pointerEnd=useCallback(()=>{setHold(false);clearInterval(iref.current);setProg(0);},[]);
  useEffect(()=>()=>clearInterval(iref.current),[]);
  const R=54,C=2*Math.PI*R,elapsed=restTotal>0?(restTotal-restSec)/restTotal:0;
  return(
    <div style={{position:"absolute",inset:0,zIndex:100,background:"#03030B",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"rgba(255,255,255,0.04)"}}><div style={{height:"100%",width:`${elapsed*100}%`,background:"#E8C547",transition:"width 1s linear"}}/></div>
      <div style={{display:"flex",alignItems:"center",gap:6,color:"rgba(255,255,255,0.2)",fontSize:10,letterSpacing:"0.12em",marginBottom:28}}><ILock size={10}/> FOCUS LOCK · {exName} S{setIdx+1} 完了</div>
      <div style={{fontSize:82,fontWeight:800,letterSpacing:"-0.06em",lineHeight:1,fontVariantNumeric:"tabular-nums",color:restSec<=10?"#F5A030":"#fff",transition:"color 0.5s"}}>{fmtTime(restSec)}</div>
      <div style={{fontSize:10,color:"rgba(255,255,255,0.15)",letterSpacing:"0.12em",marginTop:10}}>REST INTERVAL</div>
      <div style={{position:"relative",marginTop:44}}>
        <svg width={136} height={136} style={{transform:"rotate(-90deg)"}}>
          <circle cx={68} cy={68} r={R} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={4}/>
          <circle cx={68} cy={68} r={R} fill="none" stroke={hold?"#E8C547":"rgba(255,255,255,0.12)"} strokeWidth={4} strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C-(prog/100)*C} style={{transition:"stroke 0.2s"}}/>
        </svg>
        <button onMouseDown={pointerStart} onMouseUp={pointerEnd} onMouseLeave={pointerEnd} onTouchStart={pointerStart} onTouchEnd={pointerEnd}
          style={{position:"absolute",inset:10,borderRadius:"50%",background:hold?"rgba(232,197,71,0.1)":"rgba(255,255,255,0.03)",border:`1.5px solid ${hold?"rgba(232,197,71,0.4)":"rgba(255,255,255,0.08)"}`,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5,userSelect:"none",WebkitUserSelect:"none",transition:"all 0.2s"}}>
          <span style={{fontSize:26}}>🏋️</span>
          <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em"}}>{hold?"解除中…":"HOLD"}</span>
        </button>
      </div>
      <p style={{fontSize:11,color:"rgba(255,255,255,0.15)",textAlign:"center",lineHeight:1.9,marginTop:20,maxWidth:200}}>{HOLD_SEC}秒長押しで解除<br/>レストに集中しましょう</p>
      {restSec===0&&<button onClick={onUnlock} style={{marginTop:24,padding:"12px 36px",borderRadius:12,background:"rgba(74,222,128,0.12)",border:"1px solid rgba(74,222,128,0.3)",color:"#4ade80",fontSize:13,cursor:"pointer"}}>次のセットへ →</button>}
    </div>
  );
}

function RestPicker({value,onChange,disabled}){

  if(cm)return<div style={{display:"flex",alignItems:"center",gap:4,marginTop:5}}><span style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>REST</span><input autoFocus type="number" value={inp} onChange={e=>setInp(e.target.value)} onBlur={()=>{const v=parseInt(inp,10);if(v>0)onChange(v);setCm(false);}} onKeyDown={e=>{if(e.key==="Enter"){const v=parseInt(inp,10);if(v>0)onChange(v);setCm(false);}if(e.key==="Escape")setCm(false);}} placeholder="秒" style={{width:48,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,padding:"2px 6px",color:"#fff",fontSize:11,fontFamily:"inherit",outline:"none"}}/><span style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>s</span></div>;

        {!set.done&&<div style={{display:"flex",gap:3,flexShrink:0}}>{canDelete&&<button onClick={()=>onDelete(set.id)} style={cb({color:"rgba(255,80,80,0.55)"})}><IX size={10}/></button>}<button onClick={()=>onComplete(set.id)} style={cb({width:isActive?60:30,height:30,borderRadius:9,background:isActive?`${catColor}20`:"rgba(255,255,255,0.04)",border:`1.5px solid ${isActive?`${catColor}55`:"rgba(255,255,255,0.07)"}`,color:isActive?catColor:"rgba(255,255,255,0.2)",gap:3,fontSize:11,fontWeight:600,transition:"all 0.25s"})}><ICheck size={12}/>{isActive&&"完了"}</button></div>}
      </div>

function ExCard({ex,onUpdateSets,onDelete,onLock,hist}){
  const[open,setOpen]=useState(true);

  const upd=s=>onUpdateSets(sets.map(x=>x.id===s.id?s:x));
  const del=id=>{if(sets.length>1)onUpdateSets(sets.filter(s=>s.id!==id));};
  const add=()=>onUpdateSets([...sets,mkSet(sets[sets.length-1])]);
  const complete=setId=>{const updated=sets.map(s=>s.id===setId?{...s,done:true}:s),idx=sets.findIndex(s=>s.id===setId),remaining=sets.filter(s=>!s.done&&s.id!==setId).length;onUpdateSets(updated);if(remaining>0)onLock({exName:ex.name,setIdx:idx,restSec:sets[idx].rest});};

        <div style={{width:40,height:3,background:"rgba(255,255,255,0.07)",borderRadius:2,flexShrink:0}}><div style={{height:"100%",width:`${(doneN/total)*100}%`,background:allDone?"#4ade80":cat.color,borderRadius:2,transition:"width 0.5s"}}/></div>
        <button onClick={()=>onDelete(ex.id)} style={G.btn({width:26,height:26,borderRadius:7})}><IX size={10}/></button>
        <button onClick={()=>setOpen(v=>!v)} style={G.btn({width:26,height:26,borderRadius:7})}>{open?<IChevU size={12}/>:<IChevD size={12}/>}</button>
      </div>

    </div>

function WorkoutScreen({exs,setExs,hist,routines,schedule,totalAura,onSaved}){
  const[picker,setPicker]=useState(false),[filter,setFilter]=useState("all");
  const[lock,setLock]=useState(null),[restSec,setRestSec]=useState(90),[restTot,setRestTot]=useState(90);
  const[running,setRunning]=useState(false),[bannerOff,setBannerOff]=useState(false);
  const[auraPopup,setAuraPopup]=useState(null);
  const tref=useRef(null);
  useEffect(()=>{store.set(LS.SESS,exs);},[exs]);
  useEffect(()=>{if(running){tref.current=setInterval(()=>setRestSec(s=>{if(s<=1){clearInterval(tref.current);setRunning(false);return 0;}return s-1;}),1000);}else clearInterval(tref.current);return()=>clearInterval(tref.current);},[running]);
  const startLock=useCallback(({exName,setIdx,restSec:r})=>{setRestTot(r);setRestSec(r);setRunning(true);setLock({exName,setIdx});},[]);
  const endLock=useCallback(()=>{setLock(null);setRunning(false);},[]);
  const addEx=(name,catId)=>setExs(p=>[...p,mkEx(name,catId)]);
  const delEx=id=>setExs(p=>p.filter(e=>e.id!==id));
  const updEx=(id,ns)=>setExs(p=>p.map(e=>e.id===id?{...e,sets:ns}:e));
  const dow=todayDow(),rid=schedule[DAYS_KEY[dow]],todayR=rid?routines.find(r=>r.id===rid):null;
  const isBlank=exs.length===1&&exs[0].sets.length===1&&!exs[0].sets[0].done;
  const showBanner=todayR&&!bannerOff&&isBlank;
  const applyRoutine=r=>{setExs(r.items.map(it=>({...mkEx(it.name,it.catId),sets:Array.from({length:it.sets??3},()=>mkSet())})));setBannerOff(true);};
  const visible=filter==="all"?exs:exs.filter(e=>e.catId===filter);
  const totalSets=exs.reduce((a,e)=>a+e.sets.length,0),doneSets=exs.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
  const totalVol=exs.reduce((a,e)=>a+e.sets.filter(s=>s.done).reduce((b,s)=>b+s.weight*s.reps,0),0);
  const allDone=totalSets>0&&doneSets===totalSets,pct=totalSets>0?doneSets/totalSets:0;
  const finish=()=>{
    const session={id:uid(),date:todayISO(),savedAt:new Date().toISOString(),exercises:exs.map(e=>({name:e.name,catId:e.catId,sets:e.sets.filter(s=>s.done).map(s=>({weight:s.weight,reps:s.reps,done:true}))})).filter(e=>e.sets.length>0),totalVolume:totalVol};
    const pts=calcAuraFromSession(session),prevLv=getAuraLevel(totalAura),newTotal=totalAura+pts,newLv=getAuraLevel(newTotal),levelUp=newLv.level>prevLv.level;
    store.set(LS.HIST,[session,...store.get(LS.HIST,[])]);
    store.set(LS.AURA,newTotal);
    store.del(LS.SESS);
    setExs([mkEx("ベンチプレス","chest")]);setBannerOff(false);
    setAuraPopup({pts,levelUp,levelName:newLv.name,levelColor:newLv.color});
    setTimeout(()=>{setAuraPopup(null);onSaved(newTotal);},3400);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,overflowY:"auto",position:"relative"}}>
      {lock&&<OpalLock restSec={restSec} restTotal={restTot} exName={lock.exName} setIdx={lock.setIdx} onUnlock={endLock}/>}
      {picker&&<ExPicker onAdd={addEx} onClose={()=>setPicker(false)}/>}
      {auraPopup&&<AuraPopup pts={auraPopup.pts} levelUp={auraPopup.levelUp} levelName={auraPopup.levelName} levelColor={auraPopup.levelColor} onClose={()=>setAuraPopup(null)}/>}
      <div style={{padding:"18px 16px 0"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div><div style={{fontSize:18,fontWeight:700,letterSpacing:"-0.02em"}}>今日のワークアウト</div><div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>{DAYS_JA[dow]}曜日 · {exs.length}種目 · {doneSets}/{totalSets}セット{totalVol>0?` · ${totalVol}kg`:""}</div></div>
          <button onClick={()=>setPicker(true)} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 13px",borderRadius:10,background:"rgba(232,197,71,0.12)",border:"1px solid rgba(232,197,71,0.28)",color:"#E8C547",fontSize:12,fontWeight:600,cursor:"pointer"}}><IPlus size={13}/>種目追加</button>
        </div>
        <div style={{height:3,background:"rgba(255,255,255,0.07)",borderRadius:2,marginBottom:14}}><div style={{height:"100%",width:`${pct*100}%`,background:allDone?"#4ade80":"linear-gradient(90deg,#E8C547,#F5A623)",borderRadius:2,transition:"width 0.6s cubic-bezier(0.34,1.56,0.64,1)"}}/></div>
      </div>
      <AuraBanner totalPts={totalAura}/>
      {showBanner&&<TodayBanner routine={todayR} onApply={()=>applyRoutine(todayR)} onDismiss={()=>setBannerOff(true)}/>}

function RoutineScreen({routines,setRoutines,schedule,setSchedule,onLoad}){

  const create=()=>{if(!newName.trim())return;const r={id:uid(),name:newName.trim(),emoji:newEmoji,items:[]};save([...routines,r]);setEditing(r);setNewName("");setNewEmoji("💪");};
  const remove=id=>{save(routines.filter(r=>r.id!==id));const s={...schedule};Object.keys(s).forEach(k=>{if(s[k]===id)delete s[k];});setSchedule(s);store.set(LS.SCHE,s);};

    </div>
  );}

        </div>:<div style={{display:"flex",gap:4,marginTop:4}}>{DAYS_JA.map((d,i)=>{const key=DAYS_KEY[i],assigned=routines.find(r=>r.id===schedule[key]);return<div key={i} style={{flex:1,textAlign:"center"}}><div style={{fontSize:10,color:todayDow()===i?"#E8C547":"rgba(255,255,255,0.28)",marginBottom:4}}>{d}</div><div style={{height:4,borderRadius:2,background:assigned?"rgba(232,197,71,0.45)":"rgba(255,255,255,0.07)"}}/>{assigned&&<div style={{fontSize:9,color:"rgba(232,197,71,0.65)",marginTop:3}}>{assigned.emoji}</div>}</div>;})}
        </div>}
      </div>
      <div style={{padding:"0 14px"}}><div style={{fontSize:11,color:"rgba(255,255,255,0.28)",letterSpacing:"0.06em",marginBottom:8}}>マイルーチン</div>{routines.map(r=>{const ad=DAYS_KEY.map((k,i)=>schedule[k]===r.id?DAYS_JA[i]:null).filter(Boolean);return<div key={r.id} style={{marginBottom:8,...G.card()}}><div style={{display:"flex",alignItems:"center",gap:9,padding:"12px 13px"}}><span style={{fontSize:22,flexShrink:0}}>{r.emoji}</span><div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600}}>{r.name}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:1}}>{r.items.length}種目{ad.length>0&&<span style={{color:"rgba(232,197,71,0.6)",marginLeft:5}}>{ad.join("・")}曜</span>}</div></div><button onClick={()=>onLoad(r)} style={{...G.btn({width:32,height:32,borderRadius:9}),color:"#E8C547",background:"rgba(232,197,71,0.1)",border:"1px solid rgba(232,197,71,0.22)"}}><IZap size={14}/></button><button onClick={()=>setEditing(r)} style={G.btn({width:32,height:32,borderRadius:9})}><IEdit size={13}/></button><button onClick={()=>remove(r.id)} style={G.btn({width:32,height:32,borderRadius:9,color:"rgba(255,80,80,0.55)"})}><ITrash size={12}/></button></div>{r.items.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,padding:"0 13px 12px"}}>{r.items.map((it,i)=>{const c=catOf(it.catId);return<span key={i} style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:`${c.color}18`,color:c.color}}>{it.name}</span>;})}</div>}</div>;})}

    <div style={{flex:1,display:"flex",flexDirection:"column",overflowY:"auto",position:"relative"}}>
      <div style={{display:"flex",padding:"8px 14px 0",gap:6,flexShrink:0}}>

          {detail&&<div style={{position:"absolute",inset:0,zIndex:50,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end"}} onClick={()=>setDetail(null)}><div style={{width:"100%",maxHeight:"88vh",background:"#0C0C1C",borderRadius:"18px 18px 0 0",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"17px 20px 13px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}><div><div style={{fontSize:15,fontWeight:700}}>{fmtDate(detail.date)}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>総ボリューム {detail.totalVolume}kg · {detail.exercises.length}種目</div></div><div style={{display:"flex",gap:8}}><button onClick={()=>{onDelete(detail.id);setDetail(null);}} style={G.btn({width:32,height:32,borderRadius:9,color:"rgba(255,80,80,0.65)"})}><ITrash size={13}/></button><button onClick={()=>setDetail(null)} style={G.btn({width:32,height:32,borderRadius:9})}><IX size={13}/></button></div></div><div style={{overflowY:"auto",flex:1,padding:"12px 20px 28px"}}>{detail.exercises.map((ex,i)=>{const c=catOf(ex.catId),best1RM=ex.sets.reduce((b,s)=>{const rm=epley1RM(s.weight,s.reps);return rm>b?rm:b;},0);return<div key={i} style={{marginBottom:12,padding:"13px 15px",borderRadius:11,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:9}}><div style={{width:7,height:7,borderRadius:"50%",background:c.color}}/><span style={{fontSize:13,fontWeight:600}}>{ex.name}</span><span style={{marginLeft:"auto",fontSize:10,color:c.color}}>1RM≈{best1RM}kg</span></div>{ex.sets.map((s,j)=><div key={j} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderTop:j>0?"1px solid rgba(255,255,255,0.04)":"none"}}><span style={{fontSize:10,color:"rgba(255,255,255,0.22)",fontFamily:"monospace",width:16}}>S{j+1}</span><span style={{fontSize:14,fontWeight:600}}>{s.weight}<span style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>kg</span></span><span style={{fontSize:12,color:"rgba(255,255,255,0.3)"}}>×</span><span style={{fontSize:14,fontWeight:600}}>{s.reps}<span style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>reps</span></span><span style={{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,0.22)"}}>{s.weight*s.reps}kg</span></div>)}</div>;})}
          </div></div></div>}

          </div>;})}
        </div>
      ))}
    </div>
  );

function App(){
  const[tab,setTab]=useState("workout");
  const[hist,setHist]=useState(()=>store.get(LS.HIST,[]));
  const[routines,setRoutines]=useState(()=>{const r=store.get(LS.ROUT,null);return r?.length>0?r:DEFAULT_ROUTINES;});
  const[schedule,setSchedule]=useState(()=>store.get(LS.SCHE,{}));
  const[exs,setExs]=useState(()=>{const s=store.get(LS.SESS,null);return s?.length>0?s:[mkEx("ベンチプレス","chest")];});
  const[totalAura,setTotalAura]=useState(()=>store.get(LS.AURA,0));
  const delHist=id=>{const h=hist.filter(x=>x.id!==id);setHist(h);store.set(LS.HIST,h);};
  const onSaved=newAura=>{setHist(store.get(LS.HIST,[]));if(newAura!==undefined)setTotalAura(newAura);setTab("history");};
  const loadRoutine=r=>{setExs(r.items.length>0?r.items.map(it=>({...mkEx(it.name,it.catId),sets:Array.from({length:it.sets??3},()=>mkSet())})):[mkEx("ベンチプレス","chest")]);setTab("workout");};
  return(
    <div style={{...G.app,height:"100%"}}>
      {tab==="workout"&&<WorkoutScreen exs={exs} setExs={setExs} hist={hist} routines={routines} schedule={schedule} totalAura={totalAura} onSaved={onSaved}/>}
      {tab==="routine"&&<><div style={{padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}><div style={{fontSize:18,fontWeight:700,letterSpacing:"-0.02em"}}>トレーニングルーチン</div><div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>{routines.length}件 · 曜日スケジュール</div></div><RoutineScreen routines={routines} setRoutines={setRoutines} schedule={schedule} setSchedule={setSchedule} onLoad={loadRoutine}/></>}
      {tab==="history"&&<><div style={{padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}><div style={{fontSize:18,fontWeight:700,letterSpacing:"-0.02em"}}>トレーニング履歴</div><div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>{hist.length}回のセッション</div></div><HistoryScreen hist={hist} onDelete={delHist}/></>}
      <BottomNav tab={tab} onChange={setTab} histN={hist.length}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
